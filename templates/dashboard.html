{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div class="md:col-span-1 bg-white p-6 rounded-lg shadow-sm h-fit">
        <h2 class="text-xl font-bold mb-4">New Transaction</h2>
        <form action="/add_transaction/" method="POST" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Type</label>
                <select name="type" class="mt-1 w-full p-2 border border-gray-300 rounded-md bg-gray-50" required>
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" class="mt-1 w-full p-2 border border-gray-300 rounded-md" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Account</label>
                <select name="account_id" class="mt-1 w-full p-2 border border-gray-300 rounded-md bg-gray-50" required>
                    {% for account in accounts %}
                    <option value="{{ account.id }}">{{ account.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Category</label>
                <select name="category_id" class="mt-1 w-full p-2 border border-gray-300 rounded-md bg-gray-50" required>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Note (Optional)</label>
                <input type="text" name="note" class="mt-1 w-full p-2 border border-gray-300 rounded-md">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-150">
                Save Transaction
            </button>
        </form>
    </div>

    <div class="md:col-span-2 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            {% for account in accounts %}
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <h3 class="text-sm text-gray-500 uppercase tracking-wider">{{ account.name }}</h3>
                <p class="text-3xl font-bold mt-2">₹{{ account.balance }}</p>
            </div>
            {% endfor %}
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h2 class="text-xl font-bold mb-4">Recent History</h2>
            <p class="text-gray-500">History goes here...</p>
        </div>

    </div>
</div>
{% endblock %}
