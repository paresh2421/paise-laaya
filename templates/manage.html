{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <h2 class="text-xl font-bold mb-4 text-blue-600">Add Bank Account</h2>
        
        <form action="/add_account/" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Account Name</label>
                <input type="text" name="name" placeholder="e.g. SBI Savings" class="mt-1 w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Starting Balance (₹)</label>
                <input type="number" step="0.01" name="balance" value="0.00" class="mt-1 w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition">
                Create Account
            </button>
        </form>
        
        <h3 class="font-bold mt-8 mb-3 text-gray-700 border-b pb-2">Existing Accounts</h3>
        <ul class="space-y-2 text-gray-600">
            {% for acc in accounts %}
            <li class="flex justify-between">
                <span>{{ acc.name }}</span>
                <span class="font-medium">₹{{ acc.balance }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <h2 class="text-xl font-bold mb-4 text-green-600">Add Category</h2>
        
        <form action="/add_category/" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Category Name</label>
                <input type="text" name="name" placeholder="e.g. Netflix, Groceries" class="mt-1 w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded-md hover:bg-green-700 transition">
                Create Category
            </button>
        </form>
        
        <h3 class="font-bold mt-8 mb-3 text-gray-700 border-b pb-2">Existing Categories</h3>
        <ul class="space-y-2 text-gray-600">
            {% for cat in categories %}
            <li>• {{ cat.name }}</li>
            {% endfor %}
        </ul>
    </div>

</div>
{% endblock %}
