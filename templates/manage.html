{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md border border-gray-200 dark:border-gray-700 transition-colors duration-200">
        <h2 class="text-xl font-bold mb-4 text-emerald-600 dark:text-emerald-400">Add Bank Account</h2>
        
        <form action="/add_account/" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Account Name</label>
                <input type="text" name="name" placeholder="e.g. SBI Savings" class="mt-1 w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md dark:bg-gray-700 dark:text-white" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Starting Balance (₹)</label>
                <input type="number" step="0.01" name="balance" value="0.00" class="mt-1 w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md dark:bg-gray-700 dark:text-white" required>
            </div>
            <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-2 px-4 rounded-md hover:bg-emerald-700 transition">
                Create Account
            </button>
        </form>
        
        <h3 class="font-bold mt-8 mb-3 text-gray-700 dark:text-gray-300 border-b dark:border-gray-600 pb-2">Existing Accounts</h3>
        <ul class="space-y-2 text-gray-600 dark:text-gray-400">
            {% for acc in accounts %}
            <li class="flex justify-between">
                <span>{{ acc.name }}</span>
                <span class="font-medium text-gray-900 dark:text-white">₹{{ acc.balance }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>

    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md border border-gray-200 dark:border-gray-700 transition-colors duration-200">
        <h2 class="text-xl font-bold mb-4 text-green-600 dark:text-green-400">Add Category</h2>
        
        <form action="/add_category/" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Category Name</label>
                <input type="text" name="name" placeholder="e.g. Netflix, Groceries" class="mt-1 w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md dark:bg-gray-700 dark:text-white" required>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded-md hover:bg-green-700 transition">
                Create Category
            </button>
        </form>
        
        <h3 class="font-bold mt-8 mb-3 text-gray-700 dark:text-gray-300 border-b dark:border-gray-600 pb-2">Existing Categories</h3>
        <ul class="space-y-2 text-gray-600 dark:text-gray-400">
            {% for cat in categories %}
            <li>• {{ cat.name }}</li>
            {% endfor %}
        </ul>
    </div>

</div>
{% endblock %}
