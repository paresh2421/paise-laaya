{% for account in accounts %}
<div
  class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-md transition-colors duration-200 {% if loop.last and loop.length % 2 != 0 %}col-span-2{% endif %}"
>
  <h3 class="text-sm text-gray-500 dark:text-gray-400 uppercase tracking-wider">
    {{ account.name }}
  </h3>
  <p class="text-3xl font-bold mt-2 text-gray-900 dark:text-white">
    ₹{{ account.balance }}
  </p>
</div>
{% endfor %}
