{% for account in accounts %}
<div
  class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl shadow-md transition-colors duration-200 {% if loop.last and loop.length == 3 %}sm:col-span-2 lg:col-span-1{% elif loop.last and loop.length % 2 != 0 %}sm:col-span-2{% endif %}"
>
  <h3
    class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 uppercase tracking-wider"
  >
    {{ account.name }}
  </h3>
  <p
    class="text-2xl sm:text-3xl font-bold mt-2 text-gray-900 dark:text-white truncate"
  >
    ₹{{ account.balance }}
  </p>
</div>
{% endfor %} {% if not accounts %}
<div
  class="col-span-full bg-white dark:bg-gray-800 p-12 rounded-2xl border-2 border-dashed border-gray-300 dark:border-gray-600 flex flex-col items-center justify-center text-center transition-colors"
>
  <span class="text-5xl mb-4 opacity-80">🏦</span>
  <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-2">
    No accounts found
  </h3>
  <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto mb-6">
    Your dashboard is looking a little empty! Start by adding a bank account or
    cash wallet to track your money.
  </p>
  <a
    href="/manage/"
    class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2.5 px-6 rounded-lg shadow-md transition transform hover:scale-105"
  >
    Set Up an Account
  </a>
</div>
{% endif %}
