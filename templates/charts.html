{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-md border border-gray-200 dark:border-gray-700 transition-colors duration-200">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Expenses by Category</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Visual breakdown of your total spending</p>
        </div>
        
        <div id="chart-empty-state" class="hidden h-80 flex flex-col items-center justify-center text-gray-400 dark:text-gray-500">
            <span class="text-4xl mb-3">📊</span>
            <p class="italic">No expenses recorded yet.</p>
        </div>

        <div id="chart-container" class="relative h-80 w-full">
            <canvas id="expenseChart"></canvas>
        </div>
        
    </div>
</div>

<script>
    let expenseChart;

    async function renderChart() {
        const response = await fetch('/api/expenses-by-category');
        const data = await response.json();

        const canvasContainer = document.getElementById('chart-container');
        const emptyState = document.getElementById('chart-empty-state');

        if (data.values.length === 0 || data.values.every(v => v === 0)) {
            canvasContainer.classList.add('hidden');
            emptyState.classList.remove('hidden');
            return; 
        } else {
            canvasContainer.classList.remove('hidden');
            emptyState.classList.add('hidden');
        }

        const ctx = document.getElementById('expenseChart');
        if (expenseChart) expenseChart.destroy();

        const isDark = document.documentElement.classList.contains('dark');
        const textColor = isDark ? '#9ca3af' : '#4b5563';
        const borderColor = isDark ? '#1f2937' : '#ffffff';

        expenseChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: data.labels,
                datasets: [{
                    data: data.values,
                    // Keeping your existing nice color palette
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],
                    borderWidth: isDark ? 2 : 1,
                    borderColor: borderColor
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { color: textColor, padding: 20, font: { size: 14 } } }
                },
                cutout: '65%' // Makes the doughnut ring slightly thinner and sleeker
            }
        });
    }

    renderChart();
</script>
{% endblock %}
